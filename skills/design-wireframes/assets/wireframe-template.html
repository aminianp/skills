<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{TITLE}</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    /* @theme:start — keep in sync with prototype/tokens.css */
    @theme {
      --color-bg: oklch(0.99 0 0);
      --color-surface: oklch(1 0 0);
      --color-fg: oklch(0.18 0 0);
      --color-muted: oklch(0.5 0 0);
      --color-border: oklch(0.92 0 0);
      --color-primary: oklch(0.28 0 0);
      --color-primary-fg: oklch(0.99 0 0);
      --color-accent: oklch(0.55 0 0);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", Menlo, Consolas, monospace;
      --radius: 0.375rem;
    }
    /* @theme:end */
  </style>
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }
  </style>
</head>
<body class="bg-bg text-fg font-sans antialiased">
  <header class="border-b border-border px-6 py-3 flex items-center justify-between bg-surface text-sm shrink-0">
    <div class="text-muted">
      <a href="/" target="_top" class="hover:text-accent">&larr; Prototype</a>
      <span class="mx-1.5">/</span>
      <span>Wireframes</span>
      <span class="mx-1.5">/</span>
      <span class="text-fg">{TITLE}</span>
    </div>
    <div class="text-xs text-muted">
      {FLOW_NAME} &middot; Step {STEP_N} of {STEP_TOTAL}
    </div>
  </header>

  <nav class="border-b border-border px-6 py-2 flex items-center justify-between text-sm bg-bg shrink-0">
    <span>{PREV_LINK}</span>
    <span>{NEXT_LINK}</span>
  </nav>

  <main class="flex-1 overflow-y-auto px-6 py-10">
    <div class="max-w-3xl mx-auto">
      {CONTENT}
    </div>
  </main>

  <footer class="border-t border-border px-6 py-2 text-xs text-muted bg-surface shrink-0">
    Generated by <code class="font-mono">design-wireframes</code>
  </footer>
</body>
</html>
