<!--
  Hamburger drawer pattern for responsive web prototypes.

  Drop this into the body of a prototype to add a mobile nav drawer that
  hides above md (768px) and shows a full-screen overlay below it.

  PIECES:
    1. The hamburger button (sits inside your existing <nav>, alongside the logo)
    2. The inline desktop nav (also inside <nav>, hidden below md)
    3. The drawer overlay (sits at the same level as <nav>, hidden by default)
    4. The drawer toggle JS (drop into your existing <script>)

  ATTRIBUTE CONTRACT:
    - #nav-toggle  → the hamburger button (aria-controls="nav-drawer")
    - #nav-close   → the X button inside the drawer
    - #nav-drawer  → the drawer container (hidden until opened)
    - [data-nav-drawer-link] → links inside the drawer; clicking closes the drawer

  THEME ASSUMPTIONS:
    - Tailwind v4 with semantic theme classes (bg-bg, text-fg, border-border, etc.)
    - The .icon-link helper class is defined elsewhere (see icon-link component)
-->


<!-- ============================================================ -->
<!-- 1. HAMBURGER BUTTON — goes inside <nav>, alongside the logo  -->
<!-- ============================================================ -->
<button id="nav-toggle"
        class="md:hidden -mr-2 p-2 text-fg cursor-pointer rounded hover:bg-border/40"
        aria-label="Open menu" aria-expanded="false" aria-controls="nav-drawer">
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
    <line x1="3" y1="7" x2="19" y2="7"/>
    <line x1="3" y1="11" x2="19" y2="11"/>
    <line x1="3" y1="15" x2="19" y2="15"/>
  </svg>
</button>


<!-- ============================================================ -->
<!-- 2. INLINE DESKTOP NAV — same parent as the hamburger button  -->
<!-- ============================================================ -->
<div class="hidden md:flex items-center gap-7 text-sm">
  <a href="#/home" class="text-muted hover:text-fg cursor-pointer" data-nav="home">Home</a>
  <a href="#/work" class="text-muted hover:text-fg cursor-pointer" data-nav="work">Work</a>
  <a href="#/blog" class="text-muted hover:text-fg cursor-pointer" data-nav="blog">Blog</a>
  <!-- Optional: separator + secondary actions (icon links, etc.) -->
</div>


<!-- ============================================================ -->
<!-- 3. DRAWER OVERLAY — same level as <nav>, full-screen overlay -->
<!-- ============================================================ -->
<div id="nav-drawer" class="md:hidden fixed inset-0 z-30 bg-bg flex flex-col" hidden>

  <!-- Drawer header: brand + close button -->
  <div class="border-b border-border px-4 py-3 flex items-center justify-between shrink-0">
    <a href="#/home" data-nav-drawer-link class="font-semibold tracking-tight">brand</a>
    <button id="nav-close"
            class="-mr-2 p-2 text-fg cursor-pointer rounded hover:bg-border/40"
            aria-label="Close menu">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <line x1="6" y1="6" x2="16" y2="16"/>
        <line x1="16" y1="6" x2="6" y2="16"/>
      </svg>
    </button>
  </div>

  <!-- Primary nav links (large, tap-friendly) -->
  <nav class="flex-1 px-6 py-10 flex flex-col gap-1">
    <a href="#/home" data-nav-drawer-link class="display text-3xl font-semibold py-3 text-fg">Home</a>
    <a href="#/work" data-nav-drawer-link class="display text-3xl font-semibold py-3 text-fg">Work</a>
    <a href="#/blog" data-nav-drawer-link class="display text-3xl font-semibold py-3 text-fg">Blog</a>
  </nav>

  <!-- Secondary actions pinned to bottom (social icons, etc.) -->
  <div class="border-t border-border px-6 py-5 flex gap-6 items-center text-muted shrink-0">
    <!-- Place icon-link components here. Sized 22px for thumb-comfort. -->
  </div>
</div>


<!-- ============================================================ -->
<!-- 4. DRAWER TOGGLE JS — drop into your existing <script> IIFE  -->
<!-- ============================================================ -->
<script>
(function () {
  var navToggle = document.getElementById('nav-toggle');
  var navClose  = document.getElementById('nav-close');
  var navDrawer = document.getElementById('nav-drawer');

  function openDrawer() {
    if (!navDrawer) return;
    navDrawer.hidden = false;
    if (navToggle) navToggle.setAttribute('aria-expanded', 'true');
  }
  function closeDrawer() {
    if (!navDrawer) return;
    navDrawer.hidden = true;
    if (navToggle) navToggle.setAttribute('aria-expanded', 'false');
  }

  if (navToggle) navToggle.addEventListener('click', openDrawer);
  if (navClose)  navClose.addEventListener('click', closeDrawer);

  // Close when a nav link inside the drawer is tapped, so the user
  // sees the navigated-to page (not the still-open drawer).
  document.querySelectorAll('[data-nav-drawer-link]').forEach(function (link) {
    link.addEventListener('click', function () { setTimeout(closeDrawer, 0); });
  });

  // Esc closes the drawer (keyboard accessibility).
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && navDrawer && !navDrawer.hidden) closeDrawer();
  });

  // If the user resizes past md while the drawer is open, close it
  // so they don't end up with a stuck overlay on desktop.
  window.addEventListener('resize', function () {
    if (window.innerWidth >= 768 && navDrawer && !navDrawer.hidden) closeDrawer();
  });
})();
</script>


<!--
  CHECKLIST WHEN ADAPTING:
    [ ] Replace "brand" placeholder with the project's wordmark/logo
    [ ] Replace 3 nav links with the project's actual primary nav
    [ ] Add icon-link components to the bottom secondary-actions row (if applicable)
    [ ] If your inline nav uses a different breakpoint, update both `md:hidden`
        on the button and `md:flex` on the inline group AND the resize handler
    [ ] If the inline nav has its own active-state styling, mirror it on the
        drawer links so the current page is visually distinct in the drawer too
    [ ] Confirm the drawer's z-index is above any sticky nav (z-30 here, nav uses z-10)
-->
