<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frame: watch</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    /* @theme:start — keep in sync with prototype/tokens.css */
    @theme {
      --color-bg: oklch(0.99 0 0);
      --color-surface: oklch(1 0 0);
      --color-fg: oklch(0.18 0 0);
      --color-muted: oklch(0.5 0 0);
      --color-border: oklch(0.92 0 0);
      --color-primary: oklch(0.28 0 0);
      --color-primary-fg: oklch(0.99 0 0);
      --color-accent: oklch(0.55 0 0);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", Menlo, Consolas, monospace;
      --radius: 0.375rem;
    }
    /* @theme:end */
  </style>
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }
    .stage { background: color-mix(in oklch, var(--color-fg) 92%, var(--color-bg)); display: flex; align-items: center; justify-content: center; padding: 2.5rem 1.5rem; min-height: 100%; }
    .watch {
      position: relative;
      width: 230px; height: 280px;
      background: #1a1a1a;
      border-radius: 50px;
      padding: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .crown {
      position: absolute; right: -8px; top: 80px;
      width: 8px; height: 36px;
      background: linear-gradient(to right, #2a2a2a, #1a1a1a);
      border-radius: 0 4px 4px 0;
    }
    .side-button {
      position: absolute; right: -4px; top: 150px;
      width: 4px; height: 20px;
      background: #2a2a2a;
      border-radius: 0 2px 2px 0;
    }
    .face {
      width: 100%; height: 100%;
      background: var(--color-bg);
      border-radius: 38px;
      overflow: hidden;
      position: relative;
    }
    .slot {
      position: absolute; inset: 0;
      padding: 1rem 0.875rem;
      overflow-y: auto;
    }
    .placeholder { border: 2px dashed var(--color-border); border-radius: 12px; padding: 0.75rem 0.5rem; color: var(--color-muted); text-align: center; font-size: 0.7rem; line-height: 1.4; height: 100%; display: flex; align-items: center; justify-content: center; }
    .strap-top, .strap-bottom { width: 80px; height: 24px; background: linear-gradient(to bottom, #2a2a2a, #1a1a1a); position: absolute; left: 50%; transform: translateX(-50%); }
    .strap-top { top: -16px; border-radius: 8px 8px 0 0; }
    .strap-bottom { bottom: -16px; border-radius: 0 0 8px 8px; }
  </style>
</head>
<body class="bg-bg text-fg font-sans antialiased">

  <header class="border-b border-border px-6 py-3 flex items-center justify-between bg-surface text-sm shrink-0">
    <div class="text-muted">
      <a href="/" target="_top" class="hover:text-accent">&larr; Prototype</a>
      <span class="mx-1.5">/</span>
      <span>Frames</span>
      <span class="mx-1.5">/</span>
      <span class="text-fg">watch</span>
    </div>
    <div class="text-xs text-muted">Apple Watch / Wear OS &middot; ~204&times;246pt</div>
  </header>

  <main class="flex-1 overflow-y-auto">
    <div class="stage">
      <div class="watch">
        <div class="strap-top"></div>
        <div class="crown"></div>
        <div class="side-button"></div>
        <div class="face">
          <div class="slot">
            <div class="placeholder">
              Prototype slot.<br>
              <span style="font-size: 0.6rem; opacity: 0.7;">Glanceable content. One or two tasks. Avoid scrolling-heavy designs.</span>
            </div>
          </div>
        </div>
        <div class="strap-bottom"></div>
      </div>
    </div>
  </main>

  <footer class="border-t border-border px-6 py-2 text-xs text-muted bg-surface shrink-0">
    Frame template &middot; watch &middot; same template covers Apple Watch (rounded-rect) and Wear OS (visual chrome differs)
  </footer>
</body>
</html>
