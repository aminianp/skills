<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frame: phone-android</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    /* @theme:start — keep in sync with prototype/tokens.css */
    @theme {
      --color-bg: oklch(0.99 0 0);
      --color-surface: oklch(1 0 0);
      --color-fg: oklch(0.18 0 0);
      --color-muted: oklch(0.5 0 0);
      --color-border: oklch(0.92 0 0);
      --color-primary: oklch(0.28 0 0);
      --color-primary-fg: oklch(0.99 0 0);
      --color-accent: oklch(0.55 0 0);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", Menlo, Consolas, monospace;
      --radius: 0.375rem;
    }
    /* @theme:end */
  </style>
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }
    .stage { background: color-mix(in oklch, var(--color-fg) 92%, var(--color-bg)); display: flex; align-items: center; justify-content: center; padding: 2.5rem 1.5rem; min-height: 100%; }
    .device {
      width: 412px; height: 915px;
      background: #1a1a1a;
      border-radius: 38px;
      padding: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08) inset;
      position: relative;
    }
    .screen {
      width: 100%; height: 100%;
      background: var(--color-bg);
      border-radius: 30px;
      overflow: hidden;
      position: relative;
    }
    .punch-hole {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 12px; height: 12px;
      background: #000;
      border-radius: 50%;
      z-index: 10;
    }
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px 0;
      font-size: 14px; font-weight: 500; color: var(--color-fg);
      font-feature-settings: "tnum";
      height: 40px;
    }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .gesture-pill {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      width: 108px; height: 4px;
      background: var(--color-fg);
      border-radius: 2px;
      opacity: 0.7;
    }
    .slot {
      position: absolute; top: 40px; left: 0; right: 0; bottom: 0;
      padding: 1rem 1.25rem 2rem;
      overflow-y: auto;
    }
    .placeholder { border: 2px dashed var(--color-border); border-radius: 12px; padding: 1.5rem; color: var(--color-muted); text-align: center; font-size: 0.85rem; line-height: 1.6; min-height: 70%; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body class="bg-bg text-fg font-sans antialiased">

  <header class="border-b border-border px-6 py-3 flex items-center justify-between bg-surface text-sm shrink-0">
    <div class="text-muted">
      <a href="/" target="_top" class="hover:text-accent">&larr; Prototype</a>
      <span class="mx-1.5">/</span>
      <span>Frames</span>
      <span class="mx-1.5">/</span>
      <span class="text-fg">phone-android</span>
    </div>
    <div class="text-xs text-muted">Pixel 8 &middot; 412&times;915dp</div>
  </header>

  <main class="flex-1 overflow-y-auto">
    <div class="stage">
      <div class="device">
        <div class="screen">
          <div class="punch-hole"></div>
          <div class="status-bar">
            <span>9:41</span>
            <div class="status-icons">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor"><path d="M6.5 1L11.5 11H1.5L6.5 1z"/></svg>
              <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><path d="M7 0c-2.4 0-4.6.9-6.3 2.4l1 1.2C3.1 2.3 4.9 1.5 7 1.5s3.9.8 5.3 2.1l1-1.2C11.6.9 9.4 0 7 0z"/></svg>
              <svg width="22" height="11" viewBox="0 0 22 11" fill="none"><rect x="0.5" y="1" width="19" height="9" rx="1.5" stroke="currentColor"/><rect x="2" y="2.5" width="14" height="6" rx="0.5" fill="currentColor"/><rect x="20" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
            </div>
          </div>
          <div class="slot">
            <div class="placeholder">
              Prototype content slot.<br>
              <span style="font-size: 0.7rem; opacity: 0.7;">Replace this <code style="font-family: var(--font-mono);">.placeholder</code> with the prototype&rsquo;s body.</span>
            </div>
          </div>
          <div class="gesture-pill"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="border-t border-border px-6 py-2 text-xs text-muted bg-surface shrink-0">
    Frame template &middot; phone-android &middot; Pixel 8 dimensions
  </footer>
</body>
</html>
