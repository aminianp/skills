<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frame: phone-ios</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    /* @theme:start — keep in sync with prototype/tokens.css */
    @theme {
      --color-bg: oklch(0.99 0 0);
      --color-surface: oklch(1 0 0);
      --color-fg: oklch(0.18 0 0);
      --color-muted: oklch(0.5 0 0);
      --color-border: oklch(0.92 0 0);
      --color-primary: oklch(0.28 0 0);
      --color-primary-fg: oklch(0.99 0 0);
      --color-accent: oklch(0.55 0 0);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", Menlo, Consolas, monospace;
      --radius: 0.375rem;
    }
    /* @theme:end */
  </style>
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }
    .stage { background: color-mix(in oklch, var(--color-fg) 92%, var(--color-bg)); display: flex; align-items: center; justify-content: center; padding: 2.5rem 1.5rem; min-height: 100%; }
    .device {
      width: 393px; height: 852px;
      background: #000;
      border-radius: 55px;
      padding: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08) inset;
      position: relative;
    }
    .screen {
      width: 100%; height: 100%;
      background: var(--color-bg);
      border-radius: 44px;
      overflow: hidden;
      position: relative;
    }
    .island {
      position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
      width: 126px; height: 37px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px 0;
      font-size: 17px; font-weight: 600; color: var(--color-fg);
      font-feature-settings: "tnum";
      height: 54px;
    }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    .home-bar {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px;
      background: var(--color-fg);
      border-radius: 3px;
      opacity: 0.8;
    }
    .slot {
      position: absolute; top: 54px; left: 0; right: 0; bottom: 0;
      padding: 1rem 1.5rem 2rem;
      overflow-y: auto;
    }
    .placeholder { border: 2px dashed var(--color-border); border-radius: 12px; padding: 1.5rem; color: var(--color-muted); text-align: center; font-size: 0.85rem; line-height: 1.6; min-height: 70%; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body class="bg-bg text-fg font-sans antialiased">

  <header class="border-b border-border px-6 py-3 flex items-center justify-between bg-surface text-sm shrink-0">
    <div class="text-muted">
      <a href="/" target="_top" class="hover:text-accent">&larr; Prototype</a>
      <span class="mx-1.5">/</span>
      <span>Frames</span>
      <span class="mx-1.5">/</span>
      <span class="text-fg">phone-ios</span>
    </div>
    <div class="text-xs text-muted">iPhone 15 &middot; 393&times;852pt</div>
  </header>

  <main class="flex-1 overflow-y-auto">
    <div class="stage">
      <div class="device">
        <div class="screen">
          <div class="island"></div>
          <div class="status-bar">
            <span>9:41</span>
            <div class="status-icons">
              <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><rect x="0" y="6" width="3" height="5" rx="0.5"/><rect x="4.5" y="4" width="3" height="7" rx="0.5"/><rect x="9" y="2" width="3" height="9" rx="0.5"/><rect x="13.5" y="0" width="3" height="11" rx="0.5"/></svg>
              <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 0c-2.6 0-5 1-6.8 2.5l1 1.2C3.7 2.4 5.7 1.6 8 1.6s4.3.8 5.8 2.1l1-1.2C13 1 10.6 0 8 0zm0 3.2c-1.7 0-3.3.6-4.5 1.7l1 1.2c.9-.8 2.1-1.3 3.5-1.3s2.6.5 3.5 1.3l1-1.2C11.3 3.8 9.7 3.2 8 3.2zm0 3.2c-.9 0-1.7.3-2.4.9l1 1.2c.4-.4.9-.5 1.4-.5s1 .2 1.4.5l1-1.2C9.7 6.7 8.9 6.4 8 6.4zM8 9c-.4 0-.7.2-1 .4l1 1.2 1-1.2c-.3-.2-.6-.4-1-.4z"/></svg>
              <svg width="25" height="11" viewBox="0 0 25 11" fill="none"><rect x="0.5" y="0.5" width="21" height="10" rx="2" stroke="currentColor"/><rect x="2" y="2" width="16" height="7" rx="1" fill="currentColor"/><rect x="22.5" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
            </div>
          </div>
          <div class="slot">
            <div class="placeholder">
              Prototype content slot.<br>
              <span style="font-size: 0.7rem; opacity: 0.7;">Replace this <code style="font-family: var(--font-mono);">.placeholder</code> with the prototype&rsquo;s body.</span>
            </div>
          </div>
          <div class="home-bar"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="border-t border-border px-6 py-2 text-xs text-muted bg-surface shrink-0">
    Frame template &middot; phone-ios &middot; iPhone 15 dimensions
  </footer>
</body>
</html>
